<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image To Prompt Generator</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="header">

        <div class="logo">
            <i class="fas fa-image"></i>
        </div>

        <h1>Image To Prompt Generator</h1>

        <p>
            Upload an image and generate AI-ready prompts
        </p>

    </div>

    <div class="main-card">

        <div class="upload-section">

            <label for="imageInput" class="upload-box">

                <i class="fas fa-cloud-upload-alt"></i>

                <h3>Upload Image</h3>

                <p>
                    Click here or drag & drop an image
                </p>

            </label>

            <input
                type="file"
                id="imageInput"
                accept="image/*"
                hidden
            >

        </div>

        <div class="preview-section">

            <img
                id="imagePreview"
                src=""
                alt="Preview"
                style="display:none;"
            >

            <div id="emptyPreview">

                <i class="fas fa-image"></i>

                <p>
                    Image preview will appear here
                </p>

            </div>

        </div>

        <div class="prompt-section">

            <h2>
                Generated Prompt
            </h2>

            <textarea
                id="promptOutput"
                placeholder="Generated prompt will appear here..."
                readonly
            ></textarea>

        </div>

        <div class="actions">

            <button id="generateBtn">

                <i class="fas fa-wand-magic-sparkles"></i>

                Generate Prompt

            </button>

            <button id="copyBtn">

                <i class="fas fa-copy"></i>

                Copy Prompt

            </button>

            <button id="clearBtn">

                <i class="fas fa-trash"></i>

                Clear

            </button>

        </div>

    </div>

    <footer>
        © 2026 Image To Prompt Generator
    </footer>

</div>

<script src="js/app.js"></script>

</body>
</html>
